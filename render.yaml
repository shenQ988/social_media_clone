# Render Blueprint -- see https://render.com/docs/blueprint-spec
#
# NOTE: written to my best current understanding of Render's Blueprint
# field names (fromDatabase/fromService, runtime: docker, preDeployCommand).
# Render's schema has shifted before (Redis was renamed "Key Value" as a
# service type) -- double-check field names against Render's current docs
# before running `render blueprint launch`.

databases:
  - name: pixframe-pg
    plan: free
    databaseName: pixframe
    user: pixframe

services:
  - type: redis
    name: pixframe-redis
    plan: free
    ipAllowList: []

  - type: web
    name: pixframe-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    # Idempotent: mirrors bin/pixframedb create's own guard, so this is
    # safe to run on every deploy -- seeds once on first deploy, then
    # no-ops. Requires `psql` on the build image the pre-deploy command
    # runs in (Render's docker runtime provides it) and network access
    # to the linked Postgres instance, which Render grants automatically
    # to services in the same Blueprint.
    preDeployCommand: >
      psql "$DATABASE_URL" -tAc
      "SELECT 1 FROM information_schema.tables WHERE table_name='users'"
      | grep -q 1 ||
      (psql "$DATABASE_URL" -f /app/sql/schema.sql &&
       psql "$DATABASE_URL" -f /app/sql/data.sql)
    envVars:
      # Discrete fields, not connectionString -- docker-entrypoint.sh
      # assembles these into the jdbc:postgresql://... URL Spring needs,
      # since Render's connectionString is a postgres://... string in a
      # different format that Spring's datasource can't consume directly.
      - key: PGHOST
        fromDatabase:
          name: pixframe-pg
          property: host
      - key: PGPORT
        fromDatabase:
          name: pixframe-pg
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: pixframe-pg
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pixframe-pg
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pixframe-pg
          property: password
      # Used only by the preDeployCommand's psql invocations above --
      # Render's own postgres:// convenience string, distinct from the
      # jdbc:postgresql:// URL Spring needs (see PGHOST/PGPORT/PGDATABASE).
      - key: DATABASE_URL
        fromDatabase:
          name: pixframe-pg
          property: connectionString
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: pixframe-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: pixframe-redis
          type: redis
          property: port
