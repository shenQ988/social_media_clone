# Render Blueprint -- see https://render.com/docs/blueprint-spec
#
# NOTE: written to my best current understanding of Render's Blueprint
# field names (fromDatabase/fromService, runtime: docker). Render's schema
# has shifted before (Redis was renamed "Key Value" as a service type) --
# double-check field names against Render's current docs if sync fails.
#
# Database seeding is NOT done via preDeployCommand -- that feature isn't
# available on free-tier services. See docker-entrypoint.sh instead: it
# runs the same idempotent schema/data check on every container boot.

databases:
  - name: pixframe-pg
    plan: free
    databaseName: pixframe
    user: pixframe

services:
  - type: redis
    name: pixframe-redis
    plan: free
    ipAllowList: []

  - type: web
    name: pixframe-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    # Database seeding happens in docker-entrypoint.sh, not here --
    # Render's free tier doesn't support the Pre-Deploy Command feature
    # (paid plans do; if you upgrade later, moving the same idempotent
    # check back into a preDeployCommand is a reasonable cleanup, but
    # not required -- the entrypoint version works on every plan).
    envVars:
      # Discrete fields, not connectionString -- docker-entrypoint.sh
      # assembles these into the jdbc:postgresql://... URL Spring needs,
      # since Render's connectionString is a postgres://... string in a
      # different format that Spring's datasource can't consume directly.
      - key: PGHOST
        fromDatabase:
          name: pixframe-pg
          property: host
      - key: PGPORT
        fromDatabase:
          name: pixframe-pg
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: pixframe-pg
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pixframe-pg
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pixframe-pg
          property: password
      # Used only by the preDeployCommand's psql invocations above --
      # Render's own postgres:// convenience string, distinct from the
      # jdbc:postgresql:// URL Spring needs (see PGHOST/PGPORT/PGDATABASE).
      - key: DATABASE_URL
        fromDatabase:
          name: pixframe-pg
          property: connectionString
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: pixframe-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: pixframe-redis
          type: redis
          property: port
