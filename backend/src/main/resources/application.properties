server.port=${PORT:8000}

# Postgres connection (matches bin/pixframedb's default DATABASE_URL).
# Port 5433, not the default 5432 -- this machine runs another project's
# Postgres container on 5432, so pixframe-pg is remapped to avoid the clash.
spring.datasource.url=jdbc:postgresql://localhost:5433/pixframe
spring.datasource.username=pixframe
spring.datasource.password=pixframe

# Schema/data are managed via bin/pixframedb (psql), not Spring's auto-init.
spring.sql.init.mode=never

# Redis cache (see com.pixframe.cache.PostDetailCache). Dedicated container:
#   docker run --name pixframe-redis -p 6379:6379 -d redis:7
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Matches Flask's MAX_CONTENT_LENGTH = 16 * 1024 * 1024
spring.servlet.multipart.max-file-size=16MB
spring.servlet.multipart.max-request-size=16MB

# Frontend assets and uploads, resolved relative to backend/ (this module's
# working directory when run via `mvn spring-boot:run`), i.e. the repo root.
app.static-dir=../pixframe/static
app.templates-dir=../pixframe/templates
app.upload-dir=../var/uploads

# Actuator/Micrometer: expose health, JVM/CPU/HikariCP metrics, and a
# Prometheus-scrapable endpoint at /actuator/prometheus, for benchmarking.
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=pixframe-backend
# Records per-endpoint request latency histograms (needed for p95/p99
# via Prometheus histogram_quantile, in addition to k6's own client-side numbers).
management.metrics.distribution.percentiles-histogram.http.server.requests=true
# Also compute p50/p95/p99 directly, so they're readable straight off
# /actuator/metrics/http.server.requests without needing Prometheus running --
# this is measured entirely inside the JVM (server-side), so unlike k6's
# client-side latency it is NOT affected by the load generator's own CPU usage.
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
